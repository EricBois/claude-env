# ~/.tmux.conf
# Direct, no-prefix shortcuts for fast tab switching.

# --- Direct window switching by NAME (Alt + number) ---
bind -n M-1 select-window -t main
bind -n M-2 select-window -t worktree1
bind -n M-3 select-window -t worktree2

# --- F-key fallback (TUIs like Claude Code don't eat F-keys) ---
bind -n F1 select-window -t main
bind -n F2 select-window -t worktree1
bind -n F3 select-window -t worktree2

# --- Ctrl-Shift arrows for prev/next (also TUI-safe) ---
bind -n C-S-Left  previous-window
bind -n C-S-Right next-window

# --- Prev / next window (Alt + arrows) ---
bind -n M-Left  previous-window
bind -n M-Right next-window

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"

# --- difit: launch diff viewer for current pane's cwd in a popup ---
# Prefix + d (overrides default detach; use prefix+D capital for detach)
bind d display-popup -d "#{pane_current_path}" -w 90% -h 85% -E "difit . ; read -n1 -s -p 'press any key to close'"
bind D detach-client
# Alternative: just opens browser, no popup (server runs in background of current pane)
bind C-d run-shell "cd #{pane_current_path} && difit . >/dev/null 2>&1 &"

# --- Mouse: click tabs, scroll, resize panes ---
set -g mouse on

# --- Window numbering starts at 1 (matches keys) ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Status bar: show full session + all windows ---
set -g status-left-length 30
set -g status-right-length 80
set -g status-left  "#[bold]#S #[default]| "
set -g status-right "%H:%M  %d-%b"
set -g window-status-format         " #I:#W "
set -g window-status-current-format "#[reverse] #I:#W #[default]"

# --- Faster key response ---
set -sg escape-time 10

# --- Bigger history ---
set -g history-limit 100000

# --- Colors ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:Tc,xterm-256color:Tc"
