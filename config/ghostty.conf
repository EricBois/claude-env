# ============================================
# Ghostty Terminal — Linux config
# ============================================
# File: ~/.config/ghostty/config
# Reload: Ctrl+Shift+,
# View options: ghostty +show-config --default --docs

# --- Typography ---
font-family = JetBrainsMonoNerdFont
font-size = 11
font-thicken = true

# --- Theme and Colors ---
theme = light:Catppuccin Latte,dark:Catppuccin Mocha

# --- Window ---
background-opacity = 0.9
background-blur-radius = 20
window-padding-x = 10
window-padding-y = 8
window-save-state = always
window-theme = auto
gtk-titlebar-style = tabs

# --- Cursor ---
cursor-style = bar
cursor-style-blink = true
cursor-opacity = 0.8

# --- Mouse ---
mouse-hide-while-typing = true
copy-on-select = clipboard

# --- Quick Terminal (Quake-style dropdown) ---
quick-terminal-position = top
quick-terminal-screen = mouse
quick-terminal-autohide = true
quick-terminal-animation-duration = 0.15

# --- Security ---
clipboard-paste-protection = true
clipboard-paste-bracketed-safe = true

# --- Shell Integration ---
shell-integration = detect

# --- Keybindings (Linux: ctrl+shift for terminal actions) ---
# Tabs
keybind = ctrl+shift+t=new_tab
keybind = ctrl+page_up=previous_tab
keybind = ctrl+page_down=next_tab
keybind = ctrl+shift+w=close_surface

# Splits
keybind = ctrl+shift+o=new_split:right
keybind = ctrl+shift+e=new_split:down
keybind = ctrl+alt+left=goto_split:left
keybind = ctrl+alt+right=goto_split:right
keybind = ctrl+alt+up=goto_split:top
keybind = ctrl+alt+down=goto_split:bottom
keybind = ctrl+shift+equal=equalize_splits
keybind = ctrl+shift+z=toggle_split_zoom

# Font size
keybind = ctrl+plus=increase_font_size:1
keybind = ctrl+equal=increase_font_size:1
keybind = ctrl+minus=decrease_font_size:1
keybind = ctrl+zero=reset_font_size

# Quick terminal global hotkey
keybind = global:ctrl+grave_accent=toggle_quick_terminal

# Reload config
keybind = ctrl+shift+comma=reload_config

# --- Performance ---
scrollback-limit = 25000000
